<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular verde -->
  <circle cx="50" cy="50" r="50" fill="#376842"/>

  <!-- Escudo -->
  <path d="M50 10 L76 20 L76 55 Q76 74 50 84 Q24 74 24 55 L24 20 Z"
        fill="white" opacity="0.95"/>

  <!-- Borde interior escudo -->
  <path d="M50 15 L71 23.5 L71 54 Q71 70 50 79 Q29 70 29 54 L29 23.5 Z"
        fill="none" stroke="#376842" stroke-width="1.2" opacity="0.4"/>

  <!-- Polo vertical balanza -->
  <rect x="48.5" y="30" width="3" height="32" rx="1.5" fill="#376842"/>

  <!-- Barra horizontal balanza -->
  <rect x="34" y="38" width="32" height="3" rx="1.5" fill="#376842"/>

  <!-- Cadena izquierda -->
  <line x1="37" y1="41" x2="31" y2="54" stroke="#376842" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Platillo izquierdo -->
  <path d="M25 54 Q31 64 37 54 Z" fill="#376842" opacity="0.7"/>
  <ellipse cx="31" cy="54" rx="6" ry="1.5" fill="#376842"/>

  <!-- Cadena derecha -->
  <line x1="63" y1="41" x2="69" y2="54" stroke="#376842" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Platillo derecho -->
  <path d="M63 54 Q69 64 75 54 Z" fill="#376842" opacity="0.7"/>
  <ellipse cx="69" cy="54" rx="6" ry="1.5" fill="#376842"/>

  <!-- Base -->
  <rect x="46" y="62" width="8" height="4" rx="1" fill="#376842"/>
  <rect x="40" y="65" width="20" height="3" rx="1.5" fill="#376842"/>

  <!-- Texto UMECA abajo -->
  <text x="50" y="94" text-anchor="middle"
        font-family="Georgia, serif" font-size="10" font-weight="700"
        fill="white" letter-spacing="1">UMECA</text>
</svg>
