<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo UMECA</title>
  <desc>Logo oficial del sistema UMECA con escudo, balanza de justicia y texto institucional</desc>

  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#427a52"/>
      <stop offset="100%" stop-color="#2f5b3c"/>
    </linearGradient>
    <linearGradient id="panGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9efe9"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M340 26 L428 60 L428 166 Q428 224 340 260 Q252 224 252 166 L252 60 Z"
        fill="url(#shieldGrad)" stroke="#234430" stroke-width="2"/>

  <!-- Inner shield border -->
  <path d="M340 42 L412 71 L412 164 Q412 212 340 242 Q268 212 268 164 L268 71 Z"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.25"/>

  <!-- Scale pivot cap -->
  <circle cx="340" cy="86" r="5.5" fill="white"/>

  <!-- Scale vertical pole -->
  <rect x="337" y="88" width="6" height="104" rx="3" fill="white"/>

  <!-- Scale horizontal beam -->
  <rect x="284" y="108" width="112" height="5" rx="2.5" fill="white"/>
  <circle cx="290" cy="110.5" r="3" fill="white"/>
  <circle cx="390" cy="110.5" r="3" fill="white"/>

  <!-- Left chain with links -->
  <path d="M290 113 L272 146" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <circle cx="284.6" cy="122.9" r="1.8" fill="white"/>
  <circle cx="280.1" cy="131.15" r="1.8" fill="white"/>
  <circle cx="275.6" cy="139.4" r="1.8" fill="white"/>

  <!-- Right chain with links -->
  <path d="M390 113 L408 146" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <circle cx="395.4" cy="122.9" r="1.8" fill="white"/>
  <circle cx="399.9" cy="131.15" r="1.8" fill="white"/>
  <circle cx="404.4" cy="139.4" r="1.8" fill="white"/>

  <!-- Left pan -->
  <path d="M254 146 Q272 174 290 146 L254 146 Z" fill="url(#panGrad)" opacity="0.95"/>
  <path d="M254 146 Q272 174 290 146" fill="none" stroke="white" stroke-width="1.5"/>
  <ellipse cx="272" cy="146.5" rx="18" ry="2.4" fill="white"/>

  <!-- Right pan -->
  <path d="M390 146 Q408 174 426 146 L390 146 Z" fill="url(#panGrad)" opacity="0.95"/>
  <path d="M390 146 Q408 174 426 146" fill="none" stroke="white" stroke-width="1.5"/>
  <ellipse cx="408" cy="146.5" rx="18" ry="2.4" fill="white"/>

  <!-- Base triangle -->
  <polygon points="340,94 331,89 349,89" fill="white"/>

  <!-- Base stand -->
  <rect x="332" y="192" width="16" height="7" rx="2" fill="white"/>
  <rect x="318" y="197" width="44" height="6" rx="3" fill="white"/>

  <!-- Decorative sparkles -->
  <path d="M306 66 L308.4 71 L313.4 71 L309.2 74.2 L310.8 79.2 L306 76.2 L301.2 79.2 L302.8 74.2 L298.6 71 L303.6 71 Z" fill="white" opacity="0.85"/>
  <path d="M340 56 L342.1 60.4 L346.6 60.4 L342.9 63.2 L344.3 67.6 L340 65 L335.7 67.6 L337.1 63.2 L333.4 60.4 L337.9 60.4 Z" fill="white" opacity="0.85"/>
  <path d="M374 66 L376.4 71 L381.4 71 L377.2 74.2 L378.8 79.2 L374 76.2 L369.2 79.2 L370.8 74.2 L366.6 71 L371.6 71 Z" fill="white" opacity="0.85"/>

  <!-- UNIDAD DE MEDIDAS CAUTELARES arriba -->
  <text x="340" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="600" fill="#376842" letter-spacing="1.3">UNIDAD DE MEDIDAS CAUTELARES</text>

  <!-- UMECA texto grande -->
  <text x="340" y="291" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#2f5b3c" letter-spacing="5">UMECA</text>

  <!-- Líneas decorativas a los lados del texto -->
  <rect x="120" y="284" width="92" height="2" rx="1" fill="#376842" opacity="0.45"/>
  <rect x="468" y="284" width="92" height="2" rx="1" fill="#376842" opacity="0.45"/>
  <circle cx="220" cy="285" r="2.5" fill="#376842" opacity="0.6"/>
  <circle cx="460" cy="285" r="2.5" fill="#376842" opacity="0.6"/>

  <!-- Nombre oficial del sistema -->
  <text x="340" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888" letter-spacing="0.4">
    <tspan x="340" dy="0">SISTEMA DE GESTIÓN ADMINISTRATIVA PARA EL CONTROL</tspan>
    <tspan x="340" dy="11">DE MEDIDAS CAUTELARES PARA LA COORDINACIÓN DEL</tspan>
    <tspan x="340" dy="11">SISTEMA PENITENCIARIO DEL ESTADO DE MORELOS</tspan>
  </text>

</svg>
